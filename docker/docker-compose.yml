version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: goodlife-postgres
    environment:
      POSTGRES_USER: goodlife
      POSTGRES_PASSWORD: goodlife
      POSTGRES_DB: goodlife_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U goodlife']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: goodlife-api
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://goodlife:goodlife@postgres:5432/goodlife_dev
      NODE_ENV: development
    volumes:
      - ../src:/app/src
      - ../prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
